<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../styles/style_profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="../scripts/script_profile.js"></script>
</head>
<body>
    <div class="menusnake" id="menusnake_js">
        <h1 class="text-edit-profile">Редактировать пользователя</h1>
        <hr>
        <div class="logo-container">
            <img class="logo" src="../image/edit-profile.png" title="Редактировать аватарку">
        </div>
        <label>Имя</label>
        <input type="text" name="name" id="name" required placeholder="Имя" />
        <label>Пароль</label>
        <input type="password" name="password" id="password" required placeholder="Пароль" />
        <label>Повторить пароль</label>
        <input type="password" name="password_repeat" id="password_repeat" required placeholder="Повторить пароль" />
        <button type="submit" id="sumbit">Изменить</button>
    </div> 
</body>
</html>
