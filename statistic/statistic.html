<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/style_counter.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>WEBSnake</title>
    <script src="/scripts/script_statistic.js"></script>
</head>
<body>
    <div class="menusnake" id="menusnake_js">
        <h1 class="statistics">Статистика</h1>
        <hr>
        <div class="general_counter-container">
          <p class="general_counter">Общие количество яблок: <p id="counter_apple_total" class="general_counter">0</p></p>
        </div>
        <hr>
        <div class="general_counter-container">
            <p class="general_counter">Максимальная длинна: <p id="counter_max_cells" class="general_counter">0</p></p>
          </div>
        <hr>
        <div class="general_counter-container">
            <p class="general_counter">Время жизни: <p id="counter_time_life" class="general_counter">0</p></p>
        </div>
        <hr>
        <div class="button_exit-container">
            <button class="button_exit" onclick="window.location.href = '/index.html'">Выйти</button>
        </div>
    </div>
</body>
</html>
