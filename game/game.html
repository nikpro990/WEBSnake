<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="../scripts/script.js"></script>
    <title>WEBSnake</title>
</head>
<body>
    <div class="menusnake" id="menusnake_js">
        <h1 class="die">Ты Умер!</h1>
        <hr>
        <div class="apple_count">
            <img class="applecount" src="../image/apple.png">
            <p class="text">Количество яблок: </p>
            <p class="count" id="count_js">0</p>
        </div>
        <hr>
        <div class="return-container">
         <button class="return" id="return_js">Начать Заново</button>
        </div>    
    </div>    
    <div class="counter" id="counter_js">0</div>
    <canvas id="cvs" height="400" width="400"></canvas>
    <div class="control-mobile-container" id="mobile-control_js">
        <div class="container-vertically">
            <div class="up-container">
                <button class="up" id="up_js">⬆</button>
            </div>
            <div class="container-horizantally">
                <button class="left" id="left_js">⬅ </button>
                <div class="circle"></div>
                <button class="right" id="right_js">⮕</button>
            </div>
            <div class="down-container">
                <button class="down" id="down_js">⬇</button>
            </div>
        </div>
    </div>
</body>
</html>
